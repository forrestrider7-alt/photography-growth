<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>s3ven_stars zen dashboard</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&family=Inter:wght@400;600&display=swap");
    :root {
      --bg: #F1EEE8;
      --accent-1: #CAD0C5;
      --accent-2: #8D9497;
      --accent-3: #E5DFD3;
      --text: #1E2224;
      --muted: rgba(30, 34, 36, 0.62);
      --radius: 28px;
      --shadow-raised:
        -8px -8px 15px rgba(255, 255, 255, 0.85),
        8px 8px 15px rgba(120, 128, 132, 0.28);
      --shadow-pressed:
        inset -8px -8px 15px rgba(255, 255, 255, 0.85),
        inset 8px 8px 15px rgba(120, 128, 132, 0.28);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Manrope", "Inter", "SF Pro Text", "Segoe UI", system-ui, -apple-system, sans-serif;
      letter-spacing: -0.01em;
      font-size: 14px;
      min-height: 100%;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      display: grid;
      grid-template-columns: 220px 1fr;
      transition: background 0.3s ease;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 16px;
      border-right: 1px solid rgba(141, 148, 151, 0.16);
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: linear-gradient(180deg, rgba(229, 223, 211, 0.35), transparent);
    }

    .brand {
      border-radius: var(--radius);
      background: var(--bg);
      box-shadow: var(--shadow-raised);
      padding: 16px;
      margin-bottom: 10px;
    }

    .brand h1 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .nav-btn {
      border: 0;
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      box-shadow: var(--shadow-raised);
      padding: 12px 14px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .nav-btn:active,
    .nav-btn.active {
      box-shadow: var(--shadow-pressed);
      color: var(--accent-2);
    }

    main {
      padding: 24px;
      padding-bottom: calc(110px + var(--safe-bottom));
    }

    .view {
      display: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .view.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .card {
      background: var(--bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-raised);
      padding: 18px;
      transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.35s ease;
      opacity: 0;
      transform: translateY(16px);
    }

    .card.in {
      opacity: 1;
      transform: translateY(0);
    }

    .card:active {
      box-shadow: var(--shadow-pressed);
      transform: translateY(1px);
    }

    .title {
      font-size: 18px;
      margin: 0 0 12px;
      letter-spacing: -0.01em;
    }

    h2, h3, p { margin: 0 0 10px; }
    h2, h3 { font-size: 18px; }
    p { font-size: 14px; }

    .muted { color: var(--muted); font-size: 11px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: rgba(30, 34, 36, 0.82);
      margin-bottom: 8px;
    }

    input, textarea, select {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 9px 12px;
      color: var(--text);
      background: rgba(241, 238, 232, 0.86);
      box-shadow:
        inset -4px -4px 9px rgba(255, 255, 255, 0.7),
        inset 4px 4px 9px rgba(141, 148, 151, 0.16);
      outline: none;
      font: inherit;
      font-size: 14px;
      transition: all 0.3s ease;
      margin-top: 6px;
      user-select: none;
      -webkit-user-select: none;
    }
    input:focus, textarea:focus, select:focus {
      box-shadow:
        inset -4px -4px 10px rgba(255, 255, 255, 0.74),
        inset 4px 4px 10px rgba(120, 128, 132, 0.2),
        0 0 0 2px rgba(202, 208, 197, 0.42);
    }

    textarea { min-height: 92px; resize: vertical; line-height: 1.45; }

    .btn {
      border: 0;
      border-radius: 18px;
      background: var(--bg);
      color: var(--text);
      box-shadow: var(--shadow-raised);
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-sm { padding: 7px 10px; font-size: 11px; border-radius: 12px; }

    .btn:active { box-shadow: var(--shadow-pressed); }
    .btn-danger { color: #6f3f3f; }

    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .space { justify-content: space-between; }
    .chip {
      padding: 7px 10px;
      border-radius: 999px;
      box-shadow: var(--shadow-raised);
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      transition: all 0.3s ease;
      background: var(--bg);
    }
    .chip.selected { box-shadow: var(--shadow-pressed); color: var(--accent-2); }

    .status {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(202, 208, 197, 0.5);
      display: inline-block;
    }

    .task-row, .check-row {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .check-row {
      grid-template-columns: 1fr auto;
      margin-bottom: 8px;
    }

    .bottom-nav {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(10px + var(--safe-bottom));
      border-radius: 30px;
      background: rgba(241, 238, 232, 0.7);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow-raised);
      padding: 8px;
      display: none;
      gap: 6px;
      z-index: 40;
    }

    .dot-btn {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--text);
      height: 22px;
      min-width: 22px;
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.4s cubic-bezier(.22,.61,.36,1);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(141, 148, 151, 0.85);
      box-shadow: var(--shadow-raised);
      transition: all 0.4s cubic-bezier(.22,.61,.36,1);
    }
    .dot-label {
      max-width: 0;
      overflow: hidden;
      white-space: nowrap;
      font-size: 11px;
      opacity: 0;
      transition: all 0.4s cubic-bezier(.22,.61,.36,1);
    }
    .dot-btn.active {
      background: var(--bg);
      box-shadow: var(--shadow-raised);
      padding: 0 12px;
    }
    .dot-btn.active .dot {
      width: 6px;
      height: 6px;
      box-shadow: var(--shadow-pressed);
    }
    .dot-btn.active .dot-label {
      max-width: 120px;
      opacity: 1;
    }
    .icon { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .ring-wrap { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-bottom: 16px; }
    .ring-card { text-align: center; cursor: pointer; }
    .ring-svg { width: 168px; height: 168px; margin: 0 auto; display: block; }
    .ring-track { fill: none; stroke: rgba(141, 148, 151, 0.24); stroke-width: 12; }
    .ring-progress { fill: none; stroke: var(--accent-2); stroke-width: 12; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50% 50%; transition: stroke-dashoffset 0.35s ease; }
    .energy-bar { height: 12px; border-radius: 999px; overflow: hidden; background: rgba(141, 148, 151, 0.14); box-shadow: var(--shadow-pressed); }
    .energy-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); transition: width 0.35s ease; }
    .roadmap-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
    .task-add { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; margin-bottom: 12px; }
    .task-state { display: inline-flex; gap: 6px; }
    .task-row { grid-template-columns: 1fr auto auto; }
    .task-row.done { opacity: 0.5; }
    .main-blur { filter: blur(1.4px); transform: translateY(1px); transition: filter 0.2s ease; }
    .divider { border: 0; border-top: 1px solid rgba(141, 148, 151, 0.2); margin: 10px 0; }
    .modal.pop-in { animation: popIn 0.35s cubic-bezier(.17,.89,.32,1.28); }
    @keyframes popIn { from { transform: scale(0.96) translateY(12px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(241, 238, 232, 0.45);
      backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 90;
      padding: 18px;
    }

    .modal {
      width: min(780px, 100%);
      max-height: 90vh;
      overflow: auto;
      border-radius: 32px;
      background: rgba(241, 238, 232, 0.92);
      box-shadow: var(--shadow-raised);
      padding: 22px;
    }
    .modal h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .modal h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .modal .card {
      padding: 16px;
    }

    @media (max-width: 980px) {
      body { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .bottom-nav { display: flex; }
      main { padding: 16px; padding-bottom: calc(130px + var(--safe-bottom)); }
      .task-row { grid-template-columns: 64px 1fr auto; }
    }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>

  <main>
    <section class="view active" id="view-dashboard"></section>
    <section class="view" id="view-strategy"></section>
    <section class="view" id="view-tasks"></section>
    <section class="view" id="view-production"></section>
    <section class="view" id="view-feed"></section>
    <section class="view" id="view-analytics"></section>
  </main>

  <nav class="bottom-nav" id="bottomNav"></nav>

  <div class="modal-overlay" id="productionModalOverlay">
    <div class="modal pop-in" id="productionModal"></div>
  </div>
  <div class="modal-overlay" id="goalModalOverlay">
    <div class="modal pop-in" id="goalModal"></div>
  </div>

  <script>
    const STORAGE_KEY = "zenPhotoGrowthV1";
    const tabs = [
      { id: "dashboard", label: "Dashboard", icon: "home" },
      { id: "strategy", label: "Strategy", icon: "target" },
      { id: "tasks", label: "Tasks", icon: "check-square" },
      { id: "production", label: "Production", icon: "clapperboard" },
      { id: "feed", label: "Feed", icon: "rss" },
      { id: "analytics", label: "Analytics", icon: "bar-chart" }
    ];
    const statuses = ["Идея", "Сценарий", "Снято", "Монтаж", "Опубликовано"];
    const tagPresets = {
      Animals: ["#petphotography", "#animalportrait", "#petfashion", "#aestheticpets"],
      Fashion: ["#fashionphotographer", "#editorial", "#modeltest", "#lighting"],
      Street: ["#streetphotography", "#urbanstorytelling", "#candid", "#cinematic"]
    };
    const dayNames = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];
    const viralHooks = [
      "3 секунды, которые меняют восприятие кадра",
      "Смотри, как свет полностью трансформирует сцену",
      "Этот ракурс работает почти всегда",
      "Почему этот кадр цепляет с первого взгляда"
    ];

    const defaultState = {
      activeTab: "dashboard",
      igCurrent: 0,
      igGoal: 10000,
      ttCurrent: 0,
      ttGoal: 10000,
      userTags: [],
      tasks: [],
      productionItems: [],
      production: [],
      feed: {},
      metrics: {
        followers: 0,
        reach: 0,
        engagement: 0,
        collabs: 0
      }
    };

    let S = loadState();
    let activeProductionId = null;
    let activeGoalTarget = null;

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return structuredClone(defaultState);
        const parsed = JSON.parse(raw);
        const sourceProduction = Array.isArray(parsed.production) ? parsed.production : (Array.isArray(parsed.productionItems) ? parsed.productionItems : []);
        return {
          ...structuredClone(defaultState),
          ...parsed,
          igCurrent: Number(parsed.igCurrent ?? parsed.metrics?.followers) || 0,
          igGoal: Number(parsed.igGoal) || 10000,
          ttCurrent: Number(parsed.ttCurrent) || 0,
          ttGoal: Number(parsed.ttGoal) || 10000,
          userTags: Array.isArray(parsed.userTags) ? parsed.userTags.filter(t => typeof t === "string") : [],
          tasks: Array.isArray(parsed.tasks) && parsed.tasks.length === 7 ? parsed.tasks : structuredClone(defaultState.tasks),
          production: sourceProduction,
          productionItems: sourceProduction,
          feed: parsed.feed && typeof parsed.feed === "object" ? parsed.feed : {},
          metrics: { ...defaultState.metrics, ...(parsed.metrics || {}) }
        };
      } catch {
        return structuredClone(defaultState);
      }
    }

    function saveState() {
      S.productionItems = S.production;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
    }

    function debugLog(runId, hypothesisId, location, message, data) {
      // #region agent log
      fetch('http://127.0.0.1:7602/ingest/20756974-15a2-402c-b146-0cb8080f8334',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'a04ad6'},body:JSON.stringify({sessionId:'a04ad6',runId,hypothesisId,location,message,data,timestamp:Date.now()})}).catch(()=>{});
      // #endregion
    }

    function ensureStateIntegrity() {
      if (!Array.isArray(S.tasks)) S.tasks = [];
      if (!Array.isArray(S.production)) S.production = [];
      if (!Array.isArray(S.userTags)) S.userTags = [];
      if (!S.feed || typeof S.feed !== "object") S.feed = {};
      S.production.forEach((p, i) => {
        if (!p || typeof p !== "object") S.production[i] = { id: `p-fix-${Date.now()}-${i}`, title: "Новая идея", status: "Идея", scenario: "", hook: "", shotlist: [], tags: [] };
        if (!Array.isArray(S.production[i].shotlist)) S.production[i].shotlist = [];
        if (!Array.isArray(S.production[i].tags)) S.production[i].tags = [];
        if (!statuses.includes(S.production[i].status)) S.production[i].status = "Идея";
      });
    }

    function icon(name) {
      const map = {
        home: '<svg class="icon" viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.8V21h14V9.8"/></svg>',
        target: '<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>',
        "check-square": '<svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="m8 12 3 3 5-6"/></svg>',
        clapperboard: '<svg class="icon" viewBox="0 0 24 24"><path d="M4 8h16v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><path d="M4 8 7.5 3h4L8 8m4 0 3.5-5h4L16 8"/></svg>',
        rss: '<svg class="icon" viewBox="0 0 24 24"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1.7"/></svg>',
        "bar-chart": '<svg class="icon" viewBox="0 0 24 24"><path d="M4 20V11"/><path d="M10 20V4"/><path d="M16 20v-7"/><path d="M22 20h-2"/></svg>'
      };
      return map[name] || "";
    }

    function renderNavigation() {
      const sidebar = document.getElementById("sidebar");
      const bottom = document.getElementById("bottomNav");
      sidebar.innerHTML = `
        <div class="brand">
          <h1>s3ven_stars zen dashboard</h1>
          <p>futuristic soft growth workspace</p>
        </div>
        ${tabs.map(t => `
          <button class="nav-btn ${S.activeTab === t.id ? "active" : ""}" data-tab="${t.id}">
            ${icon(t.icon)} <span>${t.label}</span>
          </button>
        `).join("")}
      `;
      bottom.innerHTML = tabs.map(t => `
        <button class="dot-btn ${S.activeTab === t.id ? "active" : ""}" data-tab="${t.id}" aria-label="${t.label}">
          <span class="dot"></span>
          <span class="dot-label">· ${t.label} ·</span>
        </button>
      `).join("");
      [...sidebar.querySelectorAll("[data-tab]"), ...bottom.querySelectorAll("[data-tab]")].forEach(btn => {
        btn.addEventListener("click", () => switchTab(btn.dataset.tab));
      });
    }

    function switchTab(tabId) {
      if (!tabs.some(t => t.id === tabId)) return;
      // #region agent log
      debugLog("pre-fix", "H1", "zenphotography.html:switchTab", "switchTab called", { tabId, activeTab: S.activeTab });
      // #endregion
      const main = document.querySelector("main");
      if (main) main.classList.add("main-blur");
      S.activeTab = tabId;
      saveState();
      setTimeout(() => {
        render();
        animateCards(tabId);
        // #region agent log
        debugLog("pre-fix", "H1", "zenphotography.html:switchTab", "switchTab render complete", { tabId, hasView: Boolean(document.getElementById(`view-${tabId}`)) });
        // #endregion
        if (main) main.classList.remove("main-blur");
      }, 120);
    }

    function animateCards(tabId) {
      const cards = document.querySelectorAll(`#view-${tabId} .card`);
      cards.forEach((card, i) => {
        card.classList.remove("in");
        setTimeout(() => card.classList.add("in"), 30 + i * 55);
      });
    }

    function renderDashboard() {
      const totalProd = S.production.length;
      const published = S.production.filter(p => p.status === "Опубликовано").length;
      const taskDone = S.tasks.filter(t => t.done).length;
      const feedDone = Object.values(S.feed).filter(f => f.ig && f.tiktok && f.engaged).length;
      const igPercent = progressPercent(S.igCurrent, S.igGoal);
      const ttPercent = progressPercent(S.ttCurrent, S.ttGoal);
      const energy = calcDailyEnergy();
      document.getElementById("view-dashboard").innerHTML = `
        <h2 class="title">Dashboard</h2>
        <p class="muted">Общий ритм роста и фокус на системном контенте.</p>
        <div class="ring-wrap">
          <article class="card ring-card" data-goal-ring="ig">
            ${progressRing(igPercent, `${S.igCurrent} / ${S.igGoal}`)}
            <p><strong>Instagram:</strong> ${S.igCurrent} / ${S.igGoal}</p>
          </article>
          <article class="card ring-card" data-goal-ring="tt">
            ${progressRing(ttPercent, `${S.ttCurrent} / ${S.ttGoal}`)}
            <p><strong>TikTok:</strong> ${S.ttCurrent} / ${S.ttGoal}</p>
          </article>
        </div>
        <article class="card" style="margin-bottom:16px;">
          <div class="row space"><h3>Daily Energy</h3><strong>${energy.score}</strong></div>
          <div class="energy-bar"><div class="energy-fill" style="width:${energy.percent}%"></div></div>
          <p class="muted" style="margin-top:8px;">${energy.detail}</p>
        </article>
        <div class="grid">
          <article class="card"><h3>Контент в работе</h3><p>${totalProd} карточек</p><p class="muted">Production pipeline</p></article>
          <article class="card"><h3>Опубликовано</h3><p>${published}</p><p class="muted">Завершенные циклы</p></article>
          <article class="card"><h3>Неделя</h3><p>${taskDone}/7 задач</p><p class="muted">Tasks completion</p></article>
          <article class="card"><h3>Feed completed</h3><p>${feedDone}</p><p class="muted">IG + TikTok + Комментарии</p></article>
        </div>
      `;
      document.querySelectorAll("[data-goal-ring]").forEach(node => {
        node.onclick = () => openGoalModal(node.dataset.goalRing);
      });
    }

    function renderStrategy() {
      document.getElementById("view-strategy").innerHTML = `
        <h2 class="title">Strategy</h2>
        <p class="muted">3-Niche roadmap без визуального шума.</p>
        <div class="roadmap-grid">
          <article class="card">
            <h3>Animals</h3>
            <p><strong>Goal:</strong> Premium Brand Portfolio</p>
            <hr class="divider" />
            <p class="muted"><strong>Action:</strong> 3 studio pet shoots.</p>
          </article>
          <article class="card">
            <h3>Portrait / Fashion</h3>
            <p><strong>Goal:</strong> Magazine Aesthetic</p>
            <hr class="divider" />
            <p class="muted"><strong>Action:</strong> 2 model tests + lighting practice.</p>
          </article>
          <article class="card">
            <h3>Street</h3>
            <p><strong>Goal:</strong> Cinematic Storytelling</p>
            <hr class="divider" />
            <p class="muted"><strong>Action:</strong> 1 morning golden hour walk.</p>
          </article>
        </div>
      `;
    }

    function renderTasks() {
      const sorted = [...S.tasks].sort((a, b) => Number(a.done) - Number(b.done));
      const rows = sorted.map((t) => `
        <div class="task-row ${t.done ? "done" : ""}">
          <input data-task-input="${t.id}" value="${escapeHtml(t.text)}" placeholder="Новая задача..." />
          <div class="task-state">
            <button class="btn" data-task-priority="${t.id}" data-value="focus">${t.priority === "focus" ? "Focus" : "Later"}</button>
          </div>
          <button class="btn" data-task-toggle="${t.id}">${t.done ? "Done" : "Отметить"}</button>
        </div>
      `).join("");
      document.getElementById("view-tasks").innerHTML = `
        <h2 class="title">Tasks</h2>

    function bindDataControls() {
      const exportBtn = document.getElementById("exportStateBtn");
      const importBtn = document.getElementById("importStateBtn");
      const resetBtn = document.getElementById("resetStateBtn");
      const importInput = document.getElementById("importStateInput");
      if (!exportBtn || !importBtn || !resetBtn || !importInput) return;

      exportBtn.onclick = () => {
        const payload = {
          version: 1,
          exportedAt: new Date().toISOString(),
          data: normalizeState(S)
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `zenphotography-backup-${Date.now()}.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      };

      importBtn.onclick = () => importInput.click();
      importInput.onchange = async () => {
        const file = importInput.files && importInput.files[0];
        importInput.value = "";
        if (!file) return;
        try {
          const text = await file.text();
          const parsed = JSON.parse(text);
          const imported = parsed && typeof parsed === "object" && parsed.data ? parsed.data : parsed;
          S = normalizeState(imported);
          saveState();
          render();
          switchTab("analytics");
        } catch {
          alert("Не удалось импортировать JSON. Проверьте формат файла.");
        }
      };

      resetBtn.onclick = () => {
        if (!confirm("Сбросить все данные приложения? Это действие нельзя отменить.")) return;
        S = structuredClone(defaultState);
        saveState();
        render();
        switchTab("analytics");
      };
    }

    function normalizeState(candidate) {
      const source = candidate && typeof candidate === "object" ? candidate : {};
      const normalizedTasks = Array.isArray(source.tasks) ? source.tasks : [];
      const tasks = normalizedTasks.map((t, i) => ({
        id: typeof t.id === "string" ? t.id : `t-import-${Date.now()}-${i}`,
        text: typeof t.text === "string" ? t.text : (typeof t.day === "string" ? t.day : ""),
        priority: t.priority === "focus" ? "focus" : "later",
        done: Boolean(t.done)
      }));

      const production = Array.isArray(source.production) ? source.production : [];
      const productionItems = Array.isArray(source.productionItems) ? source.productionItems : [];
      const sourceList = production.length ? production : productionItems;
      const safeProduction = sourceList.map((p, idx) => ({
        id: typeof p.id === "string" && p.id ? p.id : `p-import-${Date.now()}-${idx}`,
        title: typeof p.title === "string" ? p.title : "Новая идея",
        status: statuses.includes(p.status) ? p.status : "Идея",
        scenario: typeof p.scenario === "string" ? p.scenario : "",
        hook: typeof p.hook === "string" ? p.hook : "",
        shotlist: Array.isArray(p.shotlist) ? p.shotlist.map(s => ({
          text: typeof s.text === "string" ? s.text : "",
          done: Boolean(s.done)
        })) : [{ text: "Сцена 1", done: false }],
        tags: Array.isArray(p.tags) ? p.tags.filter(t => typeof t === "string") : []
      }));

      const feed = {};
      const sourceFeed = source.feed && typeof source.feed === "object" ? source.feed : {};
      safeProduction.forEach(p => {
        const f = sourceFeed[p.id] || {};
        feed[p.id] = {
          ig: Boolean(f.ig),
          tiktok: Boolean(f.tiktok),
          engaged: Boolean(f.engaged)
        };
      });

      return {
        activeTab: tabs.some(t => t.id === source.activeTab) ? source.activeTab : "dashboard",
        igCurrent: Number(source.igCurrent) || 0,
        igGoal: Number(source.igGoal) || 10000,
        ttCurrent: Number(source.ttCurrent) || 0,
        ttGoal: Number(source.ttGoal) || 10000,
        userTags: Array.isArray(source.userTags) ? source.userTags.filter(t => typeof t === "string") : [],
        tasks,
        productionItems: safeProduction,
        production: safeProduction,
        feed,
        metrics: {
          followers: Number(source.metrics && source.metrics.followers) || 0,
          reach: Number(source.metrics && source.metrics.reach) || 0,
          engagement: Number(source.metrics && source.metrics.engagement) || 0,
          collabs: Number(source.metrics && source.metrics.collabs) || 0
        }
      };
    }

    function bindModalEvents() {
      const overlay = document.getElementById("productionModalOverlay");
      const item = S.production.find(p => p.id === activeProductionId);
      if (!item) return;
      const copyQuick = async (text, btn) => {
        try {
          await navigator.clipboard.writeText(text || "");
          const prev = btn.textContent;
          btn.textContent = "Copied";
          setTimeout(() => { btn.textContent = prev; }, 900);
        } catch {}
      };
      document.getElementById("closeModalBtn").onclick = closeModal;
      document.getElementById("deleteModalItemBtn").onclick = () => {
        S.production = S.production.filter(p => p.id !== item.id);
        delete S.feed[item.id];
        saveState();
        closeModal();
      };
      overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
      document.getElementById("pm-title").oninput = (e) => { item.title = e.target.value; saveState(); renderProduction(); };
      document.getElementById("pm-scenario").oninput = (e) => { item.scenario = e.target.value; syncCopyEngine(item); };
      document.getElementById("pm-hook").oninput = (e) => { item.hook = e.target.value; syncCopyEngine(item); };
      document.getElementById("copyHookBtn").onclick = (e) => copyQuick(item.hook, e.currentTarget);
      document.getElementById("copyScenarioBtn").onclick = (e) => copyQuick(item.scenario, e.currentTarget);
      document.getElementById("copyTagsBtn").onclick = (e) => copyQuick((item.tags || []).join(" "), e.currentTarget);
      document.getElementById("toggleHooksBtn").onclick = () => {
        const list = document.getElementById("viralHooksList");
        list.style.display = list.style.display === "none" ? "flex" : "none";
      };
      document.querySelectorAll("[data-vhook]").forEach(el => {
        el.onclick = () => {
          item.hook = viralHooks[+el.dataset.vhook] || item.hook;
          saveState();
          openProductionModal(item.id);
        };
      });
      document.getElementById("addShotBtn").onclick = () => {
        item.shotlist.push({ text: `Кадр ${item.shotlist.length + 1}`, done: false });
        saveState();
        openProductionModal(item.id);
      };
      document.getElementById("addShotDescBtn").onclick = () => {
        item.shotlist.push({ text: `Описание кадра ${item.shotlist.length + 1}`, done: false });
        saveState();
        openProductionModal(item.id);
      };
      document.querySelectorAll("[data-shot-text]").forEach(el => {
        el.oninput = () => {
          const i = +el.dataset.shotText;
          if (!item.shotlist[i]) return;
          item.shotlist[i].text = el.value;
          saveState();
          syncCopyEngine(item);
        };
      });
      document.querySelectorAll("[data-shot-del]").forEach(el => {
        el.onclick = () => {
          const i = +el.dataset.shotDel;
          item.shotlist.splice(i, 1);
          saveState();
          openProductionModal(item.id);
        };
      });
      document.querySelectorAll("[data-copy-shot]").forEach(el => {
        el.onclick = () => {
          const i = +el.dataset.copyShot;
          copyQuick(item.shotlist[i] ? item.shotlist[i].text : "", el);
        };
      });
      document.querySelectorAll("[data-tag]").forEach(el => {
        el.onclick = () => {
          const t = el.dataset.tag;
          item.tags = item.tags.includes(t) ? item.tags.filter(x => x !== t) : [...item.tags, t];
          saveState();
          openProductionModal(item.id);
        };
      });
      document.getElementById("addCustomTagBtn").onclick = () => {
        const input = document.getElementById("customTagInput");
        const raw = input.value.trim();
        if (!raw) return;
        const list = raw.split(",").map(x => x.trim()).filter(Boolean).map(x => x.startsWith("#") ? x : `#${x}`);
        list.forEach(tag => {
          if (!S.userTags.includes(tag)) S.userTags.push(tag);
          if (!item.tags.includes(tag)) item.tags.push(tag);
        });
        input.value = "";
        saveState();
        openProductionModal(item.id);
      };
      document.getElementById("copyBtn").onclick = async () => {
        const text = buildCopy(item);
        try {
          await navigator.clipboard.writeText(text);
          document.getElementById("copyBtn").textContent = "Скопировано";
          document.getElementById("copyBtn").style.transform = "scale(0.97)";
          setTimeout(() => {
            document.getElementById("copyBtn").textContent = "Copy to Clipboard";
            document.getElementById("copyBtn").style.transform = "";
          }, 1200);
        } catch {
          document.getElementById("copyBtn").textContent = "Не удалось";
        }
      };
    }

    function syncCopyEngine(item) {
      saveState();
      const copy = document.getElementById("copyEngineText");
      if (copy) copy.value = buildCopy(item);
    }

    function buildCopy(item) {
      return `${item.hook || ""}\n\n${item.scenario || ""}\n\n${(item.tags || []).join(" ")}`.trim();
    }

    function progressPercent(current, goal) {
      if (!goal || goal <= 0) return 0;
      return Math.max(0, Math.min(100, Math.round((current / goal) * 100)));
    }

    function progressRing(percent, centerText) {
      const radius = 56;
      const c = 2 * Math.PI * radius;
      const offset = c - (percent / 100) * c;
      return `
        <svg class="ring-svg" viewBox="0 0 180 180">
          <circle class="ring-track" cx="90" cy="90" r="${radius}"></circle>
          <circle class="ring-progress" cx="90" cy="90" r="${radius}" stroke-dasharray="${c}" stroke-dashoffset="${offset}"></circle>
          <text x="90" y="90" text-anchor="middle" fill="currentColor" font-size="12">${escapeHtml(centerText)}</text>
          <text x="90" y="108" text-anchor="middle" fill="currentColor" font-size="18" font-weight="600">${percent}%</text>
        </svg>
      `;
    }

    function calcDailyEnergy() {
      const active = S.tasks.filter(t => t.text && !t.done);
      const score = active.reduce((sum, t) => {
        const txt = t.text.toLowerCase();
        return sum + (t.priority === "focus" || /(съем|shoot|film|reel|video)/i.test(txt) ? 3 : 1);
      }, 0);
      const max = Math.max(10, S.tasks.length * 3);
      return {
        score,
        percent: Math.min(100, Math.round((score / max) * 100)),
        detail: `Активных задач: ${active.length}. Съемка дает 3 очка, планирование — 1.`
      };
    }

    function openGoalModal(type) {
      activeGoalTarget = type;
      const isIg = type === "ig";
      const current = isIg ? S.igCurrent : S.ttCurrent;
      const goal = isIg ? S.igGoal : S.ttGoal;
      document.getElementById("goalModal").innerHTML = `
        <div class="row space">
          <h2>${isIg ? "Instagram" : "TikTok"} Target</h2>
          <button class="btn" id="closeGoalModalBtn">Закрыть</button>
        </div>
        <label>Current <input id="goalCurrentInput" type="number" min="0" value="${current}" /></label>
        <label>Goal <input id="goalTargetInput" type="number" min="1" value="${goal}" /></label>
        <div class="row" style="margin-top: 12px;">
          <button class="btn" id="saveGoalBtn">Сохранить</button>
        </div>
      `;
      const overlay = document.getElementById("goalModalOverlay");
      overlay.style.display = "flex";
      document.getElementById("closeGoalModalBtn").onclick = closeGoalModal;
      overlay.onclick = (e) => { if (e.target === overlay) closeGoalModal(); };
      document.getElementById("saveGoalBtn").onclick = () => {
        const vCurrent = Number(document.getElementById("goalCurrentInput").value) || 0;
        const vGoal = Number(document.getElementById("goalTargetInput").value) || 1;
        if (activeGoalTarget === "ig") {
          S.igCurrent = vCurrent;
          S.igGoal = vGoal;
        } else {
          S.ttCurrent = vCurrent;
          S.ttGoal = vGoal;
        }
        saveState();
        closeGoalModal();
        render();
      };
    }

    function closeGoalModal() {
      activeGoalTarget = null;
      document.getElementById("goalModalOverlay").style.display = "none";
    }

    function closeModal() {
      activeProductionId = null;
      document.getElementById("productionModalOverlay").style.display = "none";
      render();
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function render() {
      ensureStateIntegrity();
      const safe = (fn) => { try { fn(); } catch {} };
      safe(renderNavigation);
      safe(renderDashboard);
      safe(renderStrategy);
      safe(renderTasks);
      safe(renderProduction);
      safe(renderFeed);
      safe(renderAnalytics);
      document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
      const active = document.getElementById(`view-${S.activeTab}`) || document.getElementById("view-dashboard");
      active.classList.add("active");
      animateCards(S.activeTab);
    }

    render();
    let touchStartX = 0;
let touchEndX = 0;

document.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
}, false);

document.addEventListener('touchend', e => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
}, false);

function handleSwipe() {
    const swipeThreshold = 100; // Чувствительность
    const tabs = ['dashboard', 'strategy', 'tasks', 'production', 'feed', 'analytics'];
    let currentIndex = tabs.indexOf(S.activeTab);

    if (touchEndX < touchStartX - swipeThreshold) {
        // Свайп влево -> Следующая вкладка
        if (currentIndex < tabs.length - 1) switchTab(tabs[currentIndex + 1]);
    }
    if (touchEndX > touchStartX + swipeThreshold) {
        // Свайп вправо -> Предыдущая вкладка
        if (currentIndex > 0) switchTab(tabs[currentIndex - 1]);
    }
}
  </script>
</body>
</html>

<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Zen Photography Growth</title>
  <style>
    :root {
      --bg: #F1EEE8;
      --accent-1: #CAD0C5;
      --accent-2: #8D9497;
      --accent-3: #E5DFD3;
      --text: #1E2224;
      --muted: rgba(30, 34, 36, 0.62);
      --radius: 28px;
      --shadow-raised:
        -8px -8px 15px rgba(255, 255, 255, 0.85),
        8px 8px 15px rgba(120, 128, 132, 0.28);
      --shadow-pressed:
        inset -8px -8px 15px rgba(255, 255, 255, 0.85),
        inset 8px 8px 15px rgba(120, 128, 132, 0.28);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", "SF Pro Text", "Segoe UI", system-ui, -apple-system, sans-serif;
      min-height: 100%;
    }

    body {
      display: grid;
      grid-template-columns: 220px 1fr;
      transition: background 0.3s ease;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 16px;
      border-right: 1px solid rgba(141, 148, 151, 0.16);
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: linear-gradient(180deg, rgba(229, 223, 211, 0.35), transparent);
    }

    .brand {
      border-radius: var(--radius);
      background: var(--bg);
      box-shadow: var(--shadow-raised);
      padding: 16px;
      margin-bottom: 10px;
    }

    .brand h1 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .nav-btn {
      border: 0;
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      box-shadow: var(--shadow-raised);
      padding: 12px 14px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .nav-btn:active,
    .nav-btn.active {
      box-shadow: var(--shadow-pressed);
      color: var(--accent-2);
    }

    main {
      padding: 24px;
      padding-bottom: calc(110px + var(--safe-bottom));
    }

    .view {
      display: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .view.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .card {
      background: var(--bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-raised);
      padding: 18px;
      transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.35s ease;
      opacity: 0;
      transform: translateY(16px);
    }

    .card.in {
      opacity: 1;
      transform: translateY(0);
    }

    .card:active {
      box-shadow: var(--shadow-pressed);
      transform: translateY(1px);
    }

    .title {
      font-size: 24px;
      margin: 0 0 12px;
      letter-spacing: 0.02em;
    }

    h2, h3, p { margin: 0 0 10px; }

    .muted { color: var(--muted); font-size: 13px; }

    input, textarea, select {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 10px 12px;
      color: var(--text);
      background: var(--bg);
      box-shadow: var(--shadow-pressed);
      outline: none;
      font: inherit;
      transition: all 0.3s ease;
      margin-top: 6px;
    }

    textarea { min-height: 82px; resize: vertical; }

    .btn {
      border: 0;
      border-radius: 18px;
      background: var(--bg);
      color: var(--text);
      box-shadow: var(--shadow-raised);
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:active { box-shadow: var(--shadow-pressed); }
    .btn-danger { color: #6f3f3f; }

    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .space { justify-content: space-between; }
    .chip {
      padding: 7px 10px;
      border-radius: 999px;
      box-shadow: var(--shadow-raised);
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      transition: all 0.3s ease;
      background: var(--bg);
    }
    .chip.selected { box-shadow: var(--shadow-pressed); color: var(--accent-2); }

    .status {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(202, 208, 197, 0.5);
      display: inline-block;
    }

    .task-row, .check-row {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .check-row {
      grid-template-columns: 1fr auto;
      margin-bottom: 8px;
    }

    .bottom-nav {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(10px + var(--safe-bottom));
      border-radius: 30px;
      background: var(--bg);
      box-shadow: var(--shadow-raised);
      padding: 8px;
      display: none;
      gap: 6px;
      z-index: 40;
    }

    .bottom-btn {
      border: 0;
      flex: 1;
      border-radius: 22px;
      background: var(--bg);
      box-shadow: var(--shadow-raised);
      color: var(--text);
      padding: 8px 6px;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
      transition: all 0.3s ease;
    }
    .bottom-btn.active, .bottom-btn:active { box-shadow: var(--shadow-pressed); color: var(--accent-2); }
    .icon { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(241, 238, 232, 0.45);
      backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 90;
      padding: 18px;
    }

    .modal {
      width: min(780px, 100%);
      max-height: 90vh;
      overflow: auto;
      border-radius: 32px;
      background: rgba(241, 238, 232, 0.92);
      box-shadow: var(--shadow-raised);
      padding: 20px;
    }

    @media (max-width: 980px) {
      body { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .bottom-nav { display: flex; }
      main { padding: 16px; padding-bottom: calc(130px + var(--safe-bottom)); }
      .task-row { grid-template-columns: 64px 1fr auto; }
    }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>

  <main>
    <section class="view active" id="view-dashboard"></section>
    <section class="view" id="view-strategy"></section>
    <section class="view" id="view-tasks"></section>
    <section class="view" id="view-production"></section>
    <section class="view" id="view-feed"></section>
    <section class="view" id="view-analytics"></section>
  </main>

  <nav class="bottom-nav" id="bottomNav"></nav>

  <div class="modal-overlay" id="productionModalOverlay">
    <div class="modal" id="productionModal"></div>
  </div>

  <script>
    const STORAGE_KEY = "zenPhotoGrowthV1";
    const tabs = [
      { id: "dashboard", label: "Dashboard", icon: "home" },
      { id: "strategy", label: "Strategy", icon: "target" },
      { id: "tasks", label: "Tasks", icon: "check-square" },
      { id: "production", label: "Production", icon: "clapperboard" },
      { id: "feed", label: "Feed", icon: "rss" },
      { id: "analytics", label: "Analytics", icon: "bar-chart" }
    ];
    const statuses = ["Идея", "Сценарий", "Снято", "Монтаж", "Опубликовано"];
    const tagPresets = {
      Animals: ["#petphoto", "#petbrand", "#animalportrait", "#dogsofinstagram"],
      Fashion: ["#fashionportrait", "#modeltest", "#aestheticvibes", "#studiolighting"],
      Street: ["#streetstory", "#milanstreetstyle", "#urbanmood", "#cityframes"]
    };
    const dayNames = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];

    const defaultState = {
      activeTab: "dashboard",
      tasks: dayNames.map(day => ({ day, text: "", done: false })),
      production: [],
      feed: {},
      metrics: {
        followers: 0,
        reach: 0,
        engagement: 0,
        collabs: 0
      }
    };

    let S = loadState();
    let activeProductionId = null;

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return structuredClone(defaultState);
        const parsed = JSON.parse(raw);
        return {
          ...structuredClone(defaultState),
          ...parsed,
          tasks: Array.isArray(parsed.tasks) && parsed.tasks.length === 7 ? parsed.tasks : structuredClone(defaultState.tasks),
          production: Array.isArray(parsed.production) ? parsed.production : [],
          feed: parsed.feed && typeof parsed.feed === "object" ? parsed.feed : {},
          metrics: { ...defaultState.metrics, ...(parsed.metrics || {}) }
        };
      } catch {
        return structuredClone(defaultState);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
    }

    function icon(name) {
      const map = {
        home: '<svg class="icon" viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.8V21h14V9.8"/></svg>',
        target: '<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>',
        "check-square": '<svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="m8 12 3 3 5-6"/></svg>',
        clapperboard: '<svg class="icon" viewBox="0 0 24 24"><path d="M4 8h16v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><path d="M4 8 7.5 3h4L8 8m4 0 3.5-5h4L16 8"/></svg>',
        rss: '<svg class="icon" viewBox="0 0 24 24"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1.7"/></svg>',
        "bar-chart": '<svg class="icon" viewBox="0 0 24 24"><path d="M4 20V11"/><path d="M10 20V4"/><path d="M16 20v-7"/><path d="M22 20h-2"/></svg>'
      };
      return map[name] || "";
    }

    function renderNavigation() {
      const sidebar = document.getElementById("sidebar");
      const bottom = document.getElementById("bottomNav");
      sidebar.innerHTML = `
        <div class="brand">
          <h1>Photo Growth Zen</h1>
          <p>Japanese Neumorphic Workspace</p>
        </div>
        ${tabs.map(t => `
          <button class="nav-btn ${S.activeTab === t.id ? "active" : ""}" data-tab="${t.id}">
            ${icon(t.icon)} <span>${t.label}</span>
          </button>
        `).join("")}
      `;
      bottom.innerHTML = tabs.map(t => `
        <button class="bottom-btn ${S.activeTab === t.id ? "active" : ""}" data-tab="${t.id}">
          ${icon(t.icon)}
          <span>${t.label}</span>
        </button>
      `).join("");
      [...sidebar.querySelectorAll("[data-tab]"), ...bottom.querySelectorAll("[data-tab]")].forEach(btn => {
        btn.addEventListener("click", () => switchTab(btn.dataset.tab));
      });
    }

    function switchTab(tabId) {
      if (!tabs.some(t => t.id === tabId)) return;
      S.activeTab = tabId;
      saveState();
      render();
      animateCards(tabId);
    }

    function animateCards(tabId) {
      const cards = document.querySelectorAll(`#view-${tabId} .card`);
      cards.forEach((card, i) => {
        card.classList.remove("in");
        setTimeout(() => card.classList.add("in"), 30 + i * 55);
      });
    }

    function renderDashboard() {
      const totalProd = S.production.length;
      const published = S.production.filter(p => p.status === "Опубликовано").length;
      const taskDone = S.tasks.filter(t => t.done).length;
      const feedDone = Object.values(S.feed).filter(f => f.ig && f.tiktok && f.engaged).length;
      document.getElementById("view-dashboard").innerHTML = `
        <h2 class="title">Dashboard</h2>
        <p class="muted">Общий ритм роста и фокус на системном контенте.</p>
        <div class="grid">
          <article class="card"><h3>Контент в работе</h3><p>${totalProd} карточек</p><p class="muted">Production pipeline</p></article>
          <article class="card"><h3>Опубликовано</h3><p>${published}</p><p class="muted">Завершенные циклы</p></article>
          <article class="card"><h3>Неделя</h3><p>${taskDone}/7 задач</p><p class="muted">Tasks completion</p></article>
          <article class="card"><h3>Feed completed</h3><p>${feedDone}</p><p class="muted">IG + TikTok + Комментарии</p></article>
        </div>
      `;
    }

    function renderStrategy() {
      document.getElementById("view-strategy").innerHTML = `
        <h2 class="title">Strategy</h2>
        <p class="muted">Ниши и позиции для контент-бизнеса фотографа.</p>
        <div class="grid">
          <article class="card">
            <h3>Animals</h3>
            <p>Портреты питомцев, эмоции, lifestyle-сцены с владельцами.</p>
            <p class="muted">Фокус: pet photography + коллаборации с брендами кормов, аксессуаров и груминга.</p>
          </article>
          <article class="card">
            <h3>Portraits / Fashion</h3>
            <p>Model tests, студийные серии и визуально цельные mood-shoots.</p>
            <p class="muted">Фокус: эстетика, свет, портфолио для стилистов и локальных fashion-проектов.</p>
          </article>
          <article class="card">
            <h3>Street</h3>
            <p>Urban storytelling: сцены города, детали, движение, характер.</p>
            <p class="muted">Фокус: Milan street style, городская мода и мини-истории в каруселях/reels.</p>
          </article>
        </div>
      `;
    }

    function renderTasks() {
      const rows = S.tasks.map((t, i) => `
        <div class="task-row">
          <strong>${t.day}</strong>
          <input data-task-input="${i}" value="${escapeHtml(t.text)}" placeholder="План на день..." />
          <button class="btn" data-task-toggle="${i}">${t.done ? "Готово" : "В работе"}</button>
        </div>
      `).join("");
      document.getElementById("view-tasks").innerHTML = `
        <h2 class="title">Tasks</h2>
        <p class="muted">План недели Mon-Sun для production и дистрибуции.</p>
        <article class="card">
          ${rows}
        </article>
      `;
      document.querySelectorAll("[data-task-input]").forEach(el => {
        el.addEventListener("input", () => {
          const idx = +el.dataset.taskInput;
          S.tasks[idx].text = el.value;
          saveState();
        });
      });
      document.querySelectorAll("[data-task-toggle]").forEach(el => {
        el.addEventListener("click", () => {
          const idx = +el.dataset.taskToggle;
          S.tasks[idx].done = !S.tasks[idx].done;
          saveState();
          render();
          animateCards("tasks");
        });
      });
    }

    function renderProduction() {
      const cards = S.production.map(item => `
        <article class="card">
          <div class="row space">
            <h3>${escapeHtml(item.title || "Без названия")}</h3>
            <span class="status">${item.status}</span>
          </div>
          <p class="muted">${escapeHtml(item.scenario || "Добавьте сценарий...")}</p>
          <div class="row space">
            <button class="btn" data-open-prod="${item.id}">Открыть</button>
            <select data-status="${item.id}">
              ${statuses.map(s => `<option ${s === item.status ? "selected" : ""}>${s}</option>`).join("")}
            </select>
          </div>
        </article>
      `).join("");
      document.getElementById("view-production").innerHTML = `
        <h2 class="title">Production</h2>
        <p class="muted">Контент-хаб: идеи, сценарии, теги, shotlist и копирайтинг-блок.</p>
        <div class="row" style="margin-bottom: 14px;">
          <button class="btn" id="addProductionBtn">+ Новая карточка</button>
        </div>
        <div class="grid">${cards || `<article class="card"><p>Пока нет карточек. Создайте первую идею.</p></article>`}</div>
      `;
      const addBtn = document.getElementById("addProductionBtn");
      if (addBtn) {
        addBtn.addEventListener("click", () => {
          const id = "p" + Date.now();
          S.production.unshift({
            id,
            title: "Новая идея",
            status: "Идея",
            scenario: "",
            hook: "",
            shotlist: [{ text: "Сцена 1", done: false }],
            tags: []
          });
          S.feed[id] = { ig: false, tiktok: false, engaged: false };
          saveState();
          render();
          animateCards("production");
        });
      }
      document.querySelectorAll("[data-open-prod]").forEach(el => {
        el.addEventListener("click", () => openProductionModal(el.dataset.openProd));
      });
      document.querySelectorAll("[data-status]").forEach(el => {
        el.addEventListener("change", () => {
          const id = el.dataset.status;
          const item = S.production.find(p => p.id === id);
          if (!item) return;
          item.status = el.value;
          saveState();
          render();
          animateCards("production");
        });
      });
    }

    function renderFeed() {
      const rows = S.production.map(item => {
        const f = S.feed[item.id] || { ig: false, tiktok: false, engaged: false };
        return `
          <article class="card">
            <div class="row space"><h3>${escapeHtml(item.title)}</h3><span class="status">${item.status}</span></div>
            <label class="check-row"><span>Published on IG</span><input type="checkbox" data-feed="${item.id}:ig" ${f.ig ? "checked" : ""} /></label>
            <label class="check-row"><span>Published on TikTok</span><input type="checkbox" data-feed="${item.id}:tiktok" ${f.tiktok ? "checked" : ""} /></label>
            <label class="check-row"><span>Engagement (Comments replied)</span><input type="checkbox" data-feed="${item.id}:engaged" ${f.engaged ? "checked" : ""} /></label>
          </article>
        `;
      }).join("");
      document.getElementById("view-feed").innerHTML = `
        <h2 class="title">Feed</h2>
        <p class="muted">Трекер дистрибуции публикаций по платформам и обратной связи.</p>
        <div class="grid">${rows || `<article class="card"><p>Нет постов для трекера. Создайте карточку в Production.</p></article>`}</div>
      `;
      document.querySelectorAll("[data-feed]").forEach(el => {
        el.addEventListener("change", () => {
          const [id, key] = el.dataset.feed.split(":");
          if (!S.feed[id]) S.feed[id] = { ig: false, tiktok: false, engaged: false };
          S.feed[id][key] = el.checked;
          const item = S.production.find(p => p.id === id);
          if (item && S.feed[id].ig && S.feed[id].tiktok && S.feed[id].engaged) item.status = "Опубликовано";
          saveState();
          render();
          animateCards("feed");
        });
      });
    }

    function renderAnalytics() {
      document.getElementById("view-analytics").innerHTML = `
        <h2 class="title">Analytics</h2>
        <p class="muted">Метрики роста: аудитория, охват, вовлечение и коллаборации.</p>
        <div class="grid">
          <article class="card">
            <label>Followers <input id="m-followers" type="number" value="${S.metrics.followers}" /></label>
            <label>Reach <input id="m-reach" type="number" value="${S.metrics.reach}" /></label>
            <label>Engagement % <input id="m-engagement" type="number" step="0.1" value="${S.metrics.engagement}" /></label>
            <label>Brand Collabs <input id="m-collabs" type="number" value="${S.metrics.collabs}" /></label>
          </article>
          <article class="card">
            <h3>Growth Pulse</h3>
            <p>Followers: <strong>${S.metrics.followers}</strong></p>
            <p>Reach: <strong>${S.metrics.reach}</strong></p>
            <p>Engagement: <strong>${S.metrics.engagement}%</strong></p>
            <p>Collabs: <strong>${S.metrics.collabs}</strong></p>
          </article>
          <article class="card">
            <h3>Данные приложения</h3>
            <p class="muted">Экспорт/импорт состояния и полный сброс.</p>
            <div class="row">
              <button class="btn" id="exportStateBtn">Экспорт JSON</button>
              <button class="btn" id="importStateBtn">Импорт JSON</button>
              <button class="btn btn-danger" id="resetStateBtn">Сбросить все</button>
            </div>
            <input id="importStateInput" type="file" accept="application/json" style="display:none;" />
          </article>
        </div>
      `;
      [["followers", "m-followers"], ["reach", "m-reach"], ["engagement", "m-engagement"], ["collabs", "m-collabs"]].forEach(([k, id]) => {
        const node = document.getElementById(id);
        if (!node) return;
        node.addEventListener("input", () => {
          S.metrics[k] = Number(node.value) || 0;
          saveState();
          renderAnalytics();
          animateCards("analytics");
        });
      });
      bindDataControls();
    }

    function bindDataControls() {
      const exportBtn = document.getElementById("exportStateBtn");
      const importBtn = document.getElementById("importStateBtn");
      const resetBtn = document.getElementById("resetStateBtn");
      const importInput = document.getElementById("importStateInput");
      if (!exportBtn || !importBtn || !resetBtn || !importInput) return;

      exportBtn.onclick = () => {
        const payload = {
          version: 1,
          exportedAt: new Date().toISOString(),
          data: normalizeState(S)
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `zenphotography-backup-${Date.now()}.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      };

      importBtn.onclick = () => importInput.click();
      importInput.onchange = async () => {
        const file = importInput.files && importInput.files[0];
        importInput.value = "";
        if (!file) return;
        try {
          const text = await file.text();
          const parsed = JSON.parse(text);
          const imported = parsed && typeof parsed === "object" && parsed.data ? parsed.data : parsed;
          S = normalizeState(imported);
          saveState();
          render();
          switchTab("analytics");
        } catch {
          alert("Не удалось импортировать JSON. Проверьте формат файла.");
        }
      };

      resetBtn.onclick = () => {
        if (!confirm("Сбросить все данные приложения? Это действие нельзя отменить.")) return;
        S = structuredClone(defaultState);
        saveState();
        render();
        switchTab("analytics");
      };
    }

    function normalizeState(candidate) {
      const source = candidate && typeof candidate === "object" ? candidate : {};
      const normalizedTasks = Array.isArray(source.tasks) ? source.tasks.slice(0, 7) : [];
      while (normalizedTasks.length < 7) {
        normalizedTasks.push({ day: dayNames[normalizedTasks.length], text: "", done: false });
      }
      const tasks = normalizedTasks.map((t, i) => ({
        day: dayNames[i],
        text: typeof t.text === "string" ? t.text : "",
        done: Boolean(t.done)
      }));

      const production = Array.isArray(source.production) ? source.production : [];
      const safeProduction = production.map((p, idx) => ({
        id: typeof p.id === "string" && p.id ? p.id : `p-import-${Date.now()}-${idx}`,
        title: typeof p.title === "string" ? p.title : "Новая идея",
        status: statuses.includes(p.status) ? p.status : "Идея",
        scenario: typeof p.scenario === "string" ? p.scenario : "",
        hook: typeof p.hook === "string" ? p.hook : "",
        shotlist: Array.isArray(p.shotlist) ? p.shotlist.map(s => ({
          text: typeof s.text === "string" ? s.text : "",
          done: Boolean(s.done)
        })) : [{ text: "Сцена 1", done: false }],
        tags: Array.isArray(p.tags) ? p.tags.filter(t => typeof t === "string") : []
      }));

      const feed = {};
      const sourceFeed = source.feed && typeof source.feed === "object" ? source.feed : {};
      safeProduction.forEach(p => {
        const f = sourceFeed[p.id] || {};
        feed[p.id] = {
          ig: Boolean(f.ig),
          tiktok: Boolean(f.tiktok),
          engaged: Boolean(f.engaged)
        };
      });

      return {
        activeTab: tabs.some(t => t.id === source.activeTab) ? source.activeTab : "dashboard",
        tasks,
        production: safeProduction,
        feed,
        metrics: {
          followers: Number(source.metrics && source.metrics.followers) || 0,
          reach: Number(source.metrics && source.metrics.reach) || 0,
          engagement: Number(source.metrics && source.metrics.engagement) || 0,
          collabs: Number(source.metrics && source.metrics.collabs) || 0
        }
      };
    }

    function openProductionModal(id) {
      const item = S.production.find(p => p.id === id);
      if (!item) return;
      activeProductionId = id;
      const tags = Object.entries(tagPresets).map(([group, values]) => `
        <div style="margin:8px 0;">
          <p class="muted">${group}</p>
          <div class="row">
            ${values.map(tag => `<span class="chip ${item.tags.includes(tag) ? "selected" : ""}" data-tag="${tag}">${tag}</span>`).join("")}
          </div>
        </div>
      `).join("");
      const shotRows = item.shotlist.map((s, idx) => `
        <label class="check-row">
          <input value="${escapeHtml(s.text)}" data-shot-text="${idx}" />
          <input type="checkbox" data-shot-done="${idx}" ${s.done ? "checked" : ""} />
        </label>
      `).join("");
      document.getElementById("productionModal").innerHTML = `
        <div class="row space">
          <h2>${escapeHtml(item.title)}</h2>
          <button class="btn" id="closeModalBtn">Закрыть</button>
        </div>
        <label>Название идеи <input id="pm-title" value="${escapeHtml(item.title)}" /></label>
        <label>Сценарий <textarea id="pm-scenario">${escapeHtml(item.scenario)}</textarea></label>
        <label>Hook (первые 3 секунды) <input id="pm-hook" value="${escapeHtml(item.hook)}" placeholder="Что зацепит внимание сразу?" /></label>
        <div class="card" style="margin-top: 12px;">
          <h3>Shotlist</h3>
          ${shotRows}
          <button class="btn" id="addShotBtn">+ Сцена</button>
        </div>
        <div class="card" style="margin-top: 12px;">
          <h3>Tags</h3>
          ${tags}
          <label>Кастомный тег <input id="customTagInput" placeholder="#yourtag" /></label>
          <button class="btn" id="addCustomTagBtn" style="margin-top: 8px;">Добавить тег</button>
          <p class="muted">Выбрано: ${item.tags.join(" ") || "нет"}</p>
        </div>
        <div class="card" style="margin-top: 12px;">
          <h3>Copy Engine</h3>
          <textarea id="copyEngineText" readonly>${buildCopy(item)}</textarea>
          <button class="btn" id="copyBtn">Copy to Clipboard</button>
        </div>
      `;
      document.getElementById("productionModalOverlay").style.display = "flex";
      bindModalEvents();
    }

    function bindModalEvents() {
      const overlay = document.getElementById("productionModalOverlay");
      const item = S.production.find(p => p.id === activeProductionId);
      if (!item) return;
      document.getElementById("closeModalBtn").onclick = closeModal;
      overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
      document.getElementById("pm-title").oninput = (e) => { item.title = e.target.value; saveState(); renderProduction(); };
      document.getElementById("pm-scenario").oninput = (e) => { item.scenario = e.target.value; syncCopyEngine(item); };
      document.getElementById("pm-hook").oninput = (e) => { item.hook = e.target.value; saveState(); };
      document.getElementById("addShotBtn").onclick = () => {
        item.shotlist.push({ text: "Новая сцена", done: false });
        saveState();
        openProductionModal(item.id);
      };
      document.querySelectorAll("[data-shot-text]").forEach(el => {
        el.oninput = () => {
          item.shotlist[+el.dataset.shotText].text = el.value;
          saveState();
        };
      });
      document.querySelectorAll("[data-shot-done]").forEach(el => {
        el.onchange = () => {
          item.shotlist[+el.dataset.shotDone].done = el.checked;
          saveState();
        };
      });
      document.querySelectorAll("[data-tag]").forEach(el => {
        el.onclick = () => {
          const t = el.dataset.tag;
          item.tags = item.tags.includes(t) ? item.tags.filter(x => x !== t) : [...item.tags, t];
          saveState();
          openProductionModal(item.id);
        };
      });
      document.getElementById("addCustomTagBtn").onclick = () => {
        const input = document.getElementById("customTagInput");
        let val = input.value.trim();
        if (!val) return;
        if (!val.startsWith("#")) val = "#" + val;
        if (!item.tags.includes(val)) item.tags.push(val);
        input.value = "";
        saveState();
        openProductionModal(item.id);
      };
      document.getElementById("copyBtn").onclick = async () => {
        const text = buildCopy(item);
        try {
          await navigator.clipboard.writeText(text);
          document.getElementById("copyBtn").textContent = "Скопировано";
          setTimeout(() => document.getElementById("copyBtn").textContent = "Copy to Clipboard", 1200);
        } catch {
          document.getElementById("copyBtn").textContent = "Не удалось";
        }
      };
    }

    function syncCopyEngine(item) {
      saveState();
      const copy = document.getElementById("copyEngineText");
      if (copy) copy.value = buildCopy(item);
      renderProduction();
    }

    function buildCopy(item) {
      return `${item.scenario || ""}\n\n${(item.tags || []).join(" ")}`.trim();
    }

    function closeModal() {
      activeProductionId = null;
      document.getElementById("productionModalOverlay").style.display = "none";
      render();
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function render() {
      renderNavigation();
      renderDashboard();
      renderStrategy();
      renderTasks();
      renderProduction();
      renderFeed();
      renderAnalytics();
      document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
      const active = document.getElementById(`view-${S.activeTab}`) || document.getElementById("view-dashboard");
      active.classList.add("active");
      animateCards(S.activeTab);
    }

    render();
  </script>
</body>
</html>
